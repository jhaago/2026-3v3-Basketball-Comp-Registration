<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3v3 Basketball Comp</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">

  <!-- iOS niceties -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    html, body { height: 100%; margin: 0; background:#000; }
    .frame { position:fixed; inset:0; border:0; width:100%; height:100%; background:#000; }

    .splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      z-index: 10;
      transition: opacity 250ms ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }

    .card {
      width: min(360px, 88vw);
      text-align: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: #fff;
    }
    .logo {
      width: 112px; height: 112px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      background: #fff;
      display: inline-block;
      overflow: hidden;
    }
    .logo img { width: 100%; height: 100%; display:block; }

    .title { margin-top: 14px; font-size: 18px; font-weight: 650; }
    .muted { margin-top: 6px; opacity: .75; font-size: 14px; }
    .spinner {
      margin: 16px auto 0;
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: rgba(255,255,255,.9);
      border-radius: 999px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fallback {
      margin-top: 18px;
      display: none;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      padding: 12px;
      border-radius: 14px;
      text-align: left;
      font-size: 14px;
      line-height: 1.35;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 12px;
      background: #fff;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 650;
    }
    
    .status {
      margin-top: 10px;
      font-size: 12px;
      opacity: .65;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="card">
      <div class="logo">
        <img src="icons/icon-192.png" alt="3v3 Basketball Comp">
      </div>
      <div class="title">3v3 Basketball Comp</div>
        <div class="muted" id="loadingText">Loading…</div>
      <div class="spinner" aria-label="Loading"></div>

      <div class="fallback" id="fallback">
        The in-app frame is taking too long to load. This can happen when sign-in cookies are blocked in embedded mode.
        <br>
        <a class="btn" id="openLink" href="#" target="_self" rel="noopener">Open app directly</a>
      </div>
      
       <div class="status" id="statusText"></div>
    </div>
  </div>

  <iframe
    class="frame"
    id="appFrame"
    allow="camera; microphone; clipboard-read; clipboard-write"
    referrerpolicy="no-referrer"
    src=""
  ></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyI9vetbGrLzCiwNgEHFgu2Bsy0-75ZsB2Kd8Dh9eRI25WdrZuvkoxh5WmyUuMaLRlS/exec";

    const frame = document.getElementById("appFrame");
    const splash = document.getElementById("splash");
    const fallback = document.getElementById("fallback");
    const openLink = document.getElementById("openLink");
const loadingText = document.getElementById("loadingText");
    const statusText = document.getElementById("statusText");

    let hasLoaded = false;
    
    openLink.href = GAS_URL;

   function setStatus(text) {
      statusText.textContent = text;
    }

    function revealApp() {
      splash.classList.add("hide");
      setTimeout(() => splash.remove(), 350);
       }

    function showFallback(reason) {
      if (hasLoaded) return;
      loadingText.textContent = "Still loading…";
      fallback.style.display = "block";
      if (reason) setStatus(reason);
    }

    frame.addEventListener("load", () => {
      hasLoaded = true;
      setStatus("Connected.");
      revealApp();
    });

     frame.addEventListener("error", () => {
      showFallback("The embedded app failed to load.");
    });

    // Fallback for browsers that don't dispatch iframe errors reliably.
    setTimeout(() => {
      showFallback("Embedded load timeout after 8 seconds.");
    }, 8000);

    frame.src = GAS_URL;
    setStatus("Connecting to deployment…");

    if ("serviceWorker" in navigator) {
       navigator.serviceWorker.register("./sw.js").catch((err) => {
        console.warn("Service worker registration failed", err);
      });
    }
  </script>
</body>
</html>
