<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3v3 Basketball Comp</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    html, body { height: 100%; margin: 0; background:#000; }
    .splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      z-index: 10;
    }
     .card {
      width: min(360px, 88vw);
      text-align: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: #fff;
    }
    .logo {
      width: 112px; height: 112px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      background: #fff;
      display: inline-block;
      overflow: hidden;
    }
    .logo img { width: 100%; height: 100%; display:block; }
    .title { margin-top: 14px; font-size: 18px; font-weight: 650; }
    .muted { margin-top: 6px; opacity: .75; font-size: 14px; line-height: 1.4; }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 12px;
      background: #fff;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 650;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="card">
      <div class="logo">
        <img src="icons/icon-192.png" alt="3v3 Basketball Comp">
      </div>
      <div class="title">3v3 Basketball Comp</div>
       <div class="muted" id="statusText">Opening registration app…</div>
      <a class="btn" id="openLink" href="#" target="_self" rel="noopener">Open now</a>
    </div>
  </div>

   <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwlymb3hQehWuWc0bzSihnqum-B7DAyCcS7HyolpbwShFolu8TwyEx3sopojDQiw6Gd/exec";
    const openLink = document.getElementById("openLink");
    const statusText = document.getElementById("statusText");

    openLink.href = GAS_URL;

  setTimeout(() => {
      statusText.textContent = "If nothing happens, tap Open now.";
      window.location.replace(GAS_URL);
    }, 250);

    if ("serviceWorker" in navigator) {
       navigator.serviceWorker.register("./sw.js").catch((err) => {
        console.warn("Service worker registration failed", err);
      });
    }
  </script>
</body>
</html>
